<!DOCTYPE html>
<html>
<head>
    <title>Basic Input Types</title>
</head>
<body>

<h2>Basic Input Types</h2>

<form>
    Name: <input type="text" placeholder="Enter your name"><br><br>

    Gender:
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female<br><br>

    Hobbies:
    <input type="checkbox"> Reading
    <input type="checkbox"> Sports<br><br>

    Age: <input type="number" min="1" max="100"><br><br>

    Volume: <input type="range" min="0" max="100"><br><br>

    <input type="button" value="Click Me">
</form>

</body>
</html>
