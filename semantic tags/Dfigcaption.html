<!DOCTYPE html>
<html>

<head>
    <title>Figcaption Tag</title>
    <style>
        h2 {
        Color:#006400;
        font-size:50px;
        Text-align:none;
        margin-bottom:0px;
        }
        p {
        font-size:25px;
        text-align:none;
        margin-top:0px;
        }
    </style>
</head>

<body>
    <h2>Technical training</h2>
    <figure>
        <img src="Jellyfish.jpg" 
             alt="gfg" 
             style="width:20%">
        <figcaption>
          this information is related the tech training
          </figcaption>
    </figure>
</body>

</html>
