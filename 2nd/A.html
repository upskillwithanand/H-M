<!DOCTYPE html>
<html>
<head>
    <title>Online Learning Page</title>
</head>
<body>

    <h1>Welcome to My Learning Page</h1>

    <!-- 1. HTML LINK TAG -->
    <h2>Useful Links</h2>
    <p>
        Visit 
        <a href="https://www.google.com" target="_blank">Google</a>
    </p>

    <p>
        Visit 
        <a href="https://www.wikipedia.org" target="_blank">Wikipedia</a>
    </p>


    <!-- 2. HTML IMAGE TAG -->
    <h2>Learning Image</h2>
    <img src="car.jpg" 
         alt="Sample Learning Image" 
         width="300" height="200">


    <!-- 3. IMAGE HYPERLINK -->
    <h2>Click Image to Visit YouTube</h2>
    <a href="https://www.youtube.com" target="_blank">
        <img src="car.jpg" 
             alt="YouTube Image">
    </a>


    <!-- 4. IFRAME -->
    <h2>Watch Learning Video</h2>
    <iframe width="400" height="250" 
        src="https://www.youtube.com/embed/tgbNymZ7vqY"
        title="YouTube video"
        frameborder="10"
        allowfullscreen>
    </iframe>


</body>
</html>
